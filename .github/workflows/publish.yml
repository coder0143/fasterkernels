name: FasterKernels to pypi

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-and-publish:
    name: Build & Publish Package
    runs-on: ubuntu-latest
    
    # Required permissions for trusted publishing via OIDC
    permissions:
      id-token: write      # Crucial: allows obtaining the OIDC JWT token
      contents: read       # Crucial: allows checking out repository files

    environment:
      name: pypi
      url: https://pypi.org/p/fasterkernels

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build Wheel & Source Tarball
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
